<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a7d3e" />
  <title>Highland Games Tracker — See the Gap</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="gap-page">
  <header class="app-header">
    <h1>Highland Games Tracker</h1>
    <nav class="screen-nav">
      <a href="index.html">Set PRs &amp; Goals</a>
      <a href="session.html">Log Session</a>
      <a href="gap.html" class="active">See the Gap</a>
      <a href="tests.html">Tests</a>
    </nav>
  </header>

  <main class="container">
    <p class="intro">How close you are, per event and lift, to where you were before.</p>

    <div class="filter-bar" role="radiogroup" aria-label="Filter best by session type">
      <button type="button" class="filter-btn active" data-filter="competition" role="radio" aria-checked="true">Competition</button>
      <button type="button" class="filter-btn" data-filter="training" role="radio" aria-checked="false">Training</button>
      <button type="button" class="filter-btn" data-filter="all" role="radio" aria-checked="false">All</button>
    </div>

    <section class="group">
      <h2>Throws</h2>
      <p class="gap-hint">Tap any percent for details on when and where each mark was set.</p>
      <div class="gap-items" id="throws-list"></div>
    </section>

    <section class="group">
      <h2>Lifts</h2>
      <div class="gap-items" id="lifts-list"></div>
    </section>
  </main>

  <script src="shared.js"></script>
  <script src="gap.js"></script>
</body>
</html>
