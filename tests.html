<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Adaptive Oak's Comeback Tracker — Tests</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .test-banner {
      background: #fff8e6;
      border: 1px solid #f0d690;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      color: #6b4f00;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .test-banner strong {
      color: #5a3f00;
    }
    .test-controls {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .test-controls .save-btn {
      max-width: 240px;
    }
    .test-summary {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
    }
    .test-summary.all-passed {
      background: #e8f5ec;
      color: var(--accent-press);
      border: 1px solid #b6dec2;
    }
    .test-summary.has-failures {
      background: #fdecec;
      color: var(--error);
      border: 1px solid #f3c2c2;
    }
    .test-results {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .test-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      font-size: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: baseline;
    }
    .test-status {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 600;
      flex: 0 0 auto;
      min-width: 60px;
    }
    .test-row.pass .test-status {
      color: var(--accent-press);
    }
    .test-row.fail {
      background: #fdecec;
      border-color: #f3c2c2;
    }
    .test-row.fail .test-status {
      color: var(--error);
    }
    .test-name {
      flex: 1;
    }
    .test-message {
      flex: 1 0 100%;
      margin-top: 0.35rem;
      padding: 0.5rem 0.75rem;
      background: #fff;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.8rem;
      color: var(--error);
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <img src="images/adaptive-oak-logo.png" alt="The Adaptive Oak — Matt Hall" class="brand-logo" />
    <h1>The Adaptive Oak's Comeback Tracker</h1>
    <nav class="screen-nav">
      <a href="index.html">Set Baseline</a>
      <a href="session.html">Log Session</a>
      <a href="gap.html">See the Gap</a>
      <a href="tests.html" class="active">Tests</a>
    </nav>
  </header>

  <main class="container">
    <div class="test-banner">
      <strong>Heads up:</strong> Running tests temporarily clears the saved
      Comeback Tracker data in this browser and restores it when the run
      finishes. Close any other tabs of the app first so they do not save
      over the restore.
    </div>

    <div class="test-controls">
      <button id="run-btn" class="save-btn" type="button">Run Tests</button>
    </div>

    <div id="test-summary" class="test-summary" hidden></div>
    <ul id="test-results" class="test-results"></ul>
  </main>

  <script src="shared.js"></script>
  <script src="tests.js"></script>
</body>
</html>
