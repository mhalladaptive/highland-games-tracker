<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a7d3e" />
  <title>Comeback Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Comeback Tracker</h1>
    <nav class="screen-nav">
      <a href="index.html" class="active">Set Baseline</a>
      <a href="session.html">Log Session</a>
      <a href="gap.html">See the Gap</a>
      <a href="tests.html">Tests</a>
    </nav>
  </header>

  <main class="container">
    <p class="intro">
      Enter your pre-2020 marks for each event and lift. These are the
      reference numbers you are working back toward. You can leave any
      item blank and come back to it later.
    </p>

    <form id="baseline-form" novalidate>
      <section class="group" data-category="throw">
        <h2>Throws</h2>
        <div class="items" id="throws-list"></div>
      </section>

      <section class="group" data-category="lift">
        <h2>Lifts</h2>
        <div class="items" id="lifts-list"></div>
      </section>

      <div class="actions">
        <button type="submit" class="save-btn">Save Baseline</button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </div>
    </form>
  </main>

  <script src="shared.js"></script>
  <script src="app.js"></script>
</body>
</html>
