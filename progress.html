<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a7d3e" />
  <title>Highland Games Tracker — Progress</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="gap-page">
  <header class="app-header">
    <h1>Highland Games Tracker</h1>
    <nav class="screen-nav">
      <a href="index.html">Set PRs &amp; Goals</a>
      <a href="session.html">Log Session</a>
      <a href="progress.html" class="active">Progress</a>
      <a href="tests.html">Tests</a>
    </nav>
  </header>

  <main class="container">
    <p class="intro">Your best mark in each throw, against your personal record.</p>

    <div class="filter-bar" role="radiogroup" aria-label="Choose the session window">
      <button type="button" class="filter-btn" data-window="last" role="radio" aria-checked="false">Last session</button>
      <button type="button" class="filter-btn active" data-window="past3" role="radio" aria-checked="true">Past 3 sessions</button>
      <button type="button" class="filter-btn" data-window="ytd" role="radio" aria-checked="false">Year to date</button>
    </div>

    <section class="group">
      <h2>Throws</h2>
      <div class="gap-items" id="throws-list"></div>
    </section>
  </main>

  <script src="shared.js"></script>
  <script src="progress.js"></script>
</body>
</html>
